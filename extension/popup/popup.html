<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>법고개 (Bupgogae)</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 헤더 -->
  <header class="popup-header">
    <img src="../icons/icon48.png" alt="법고개" class="popup-logo" width="28" height="28">
    <div class="popup-title-group">
      <h1 class="popup-title">법고개</h1>
      <span class="popup-subtitle">LLM 환각 판례 탐지기</span>
    </div>
  </header>

  <!-- 현재 사이트 정보 -->
  <div class="popup-site-info">
    <span class="popup-site-label">현재 사이트</span>
    <span class="popup-site-host" id="currentHost">—</span>
  </div>

  <!-- 토글 컨트롤 -->
  <div class="popup-controls">
    <!-- 사이트별 토글 -->
    <div class="popup-toggle-row" id="siteToggleRow">
      <div class="popup-toggle-info">
        <span class="popup-toggle-label">이 사이트에서 적용</span>
        <span class="popup-toggle-desc" id="siteToggleDesc">현재 사이트에서 판례 검증 활성</span>
      </div>
      <label class="toggle-switch" for="siteToggle">
        <input type="checkbox" id="siteToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <hr class="popup-divider">

    <!-- 전체 토글 -->
    <div class="popup-toggle-row">
      <div class="popup-toggle-info">
        <span class="popup-toggle-label">모든 사이트에서 적용</span>
        <span class="popup-toggle-desc" id="globalToggleDesc">모든 사이트에서 판례 검증 활성</span>
      </div>
      <label class="toggle-switch" for="globalToggle">
        <input type="checkbox" id="globalToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- 확장기능 (DLC) -->
  <div class="popup-dlc-section">
    <button class="popup-dlc-header" id="dlcToggleBtn" type="button">
      <span class="popup-dlc-icon">🧩</span>
      <span class="popup-dlc-title">확장기능</span>
      <span class="popup-dlc-arrow" id="dlcArrow">▾</span>
    </button>
    <div class="popup-dlc-body" id="dlcBody">
      <!-- 법원 토글 (기본 ON, core DB) -->
      <div class="popup-toggle-row popup-dlc-row">
        <div class="popup-toggle-info">
          <span class="popup-toggle-label">법원</span>
          <span class="popup-toggle-desc" id="courtFilterDesc">법원 판례 검증 활성</span>
        </div>
        <label class="toggle-switch" for="courtFilterToggle">
          <input type="checkbox" id="courtFilterToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 헌법재판소 토글 (기본 ON, core DB) -->
      <div class="popup-toggle-row popup-dlc-row">
        <div class="popup-toggle-info">
          <span class="popup-toggle-label">헌법재판소</span>
          <span class="popup-toggle-desc" id="constitutionalFilterDesc">헌재 결정 검증 활성</span>
        </div>
        <label class="toggle-switch" for="constitutionalFilterToggle">
          <input type="checkbox" id="constitutionalFilterToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 조세심판원 토글 (기본 OFF, DLC) -->
      <div class="popup-toggle-row popup-dlc-row">
        <div class="popup-toggle-info">
          <span class="popup-toggle-label">조세심판원</span>
          <span class="popup-toggle-desc" id="taxDlcDesc">조세심판 사건 검증 비활성</span>
        </div>
        <label class="toggle-switch" for="taxDlcToggle">
          <input type="checkbox" id="taxDlcToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 특허심판원 토글 (기본 OFF, DLC) -->
      <div class="popup-toggle-row popup-dlc-row">
        <div class="popup-toggle-info">
          <span class="popup-toggle-label">특허심판원</span>
          <span class="popup-toggle-desc" id="patentDlcDesc">특허심판 사건 검증 비활성</span>
        </div>
        <label class="toggle-switch" for="patentDlcToggle">
          <input type="checkbox" id="patentDlcToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- DB 삭제 버튼 -->
      <button class="popup-dlc-delete-btn" id="dlcDeleteBtn" type="button">
        확장기능 DB 삭제
      </button>
    </div>
  </div>

  <!-- 푸터 상태 -->
  <footer class="popup-footer">
    <span class="popup-status" id="statusText">활성 상태</span>
    <span class="popup-db-date" id="dbDate">DB 일자 : —</span>
    <span class="popup-db-count" id="dbCount">판례 수 : —</span>
    <span class="popup-contact">개발자 연락처: <a href="mailto:nashdir.dev@gmail.com" id="contactLink">nashdir.dev@gmail.com</a></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
